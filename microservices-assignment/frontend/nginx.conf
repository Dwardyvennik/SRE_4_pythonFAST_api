server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /auth/ {
        proxy_pass http://auth-service:8001/;
    }

    location /users/ {
        proxy_pass http://user-service:8002/users/;
    }

    location /products/ {
        proxy_pass http://product-service:8003/products/;
    }

    location /orders/ {
        proxy_pass http://order-service:8004/;
    }

    location /chat/ {
        proxy_pass http://chat-service:8005/;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
