version: "3.8"

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy

  user-service:
    build: ./services/user-service
    ports:
      - "8002:8002"
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      - auth-service

  product-service:
    build: ./services/product-service
    ports:
      - "8003:8003"
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      - user-service

  order-service:
    build: ./services/order-service
    ports:
      - "8004:8004"
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy

  chat-service:
    build: ./services/chat-service
    ports:
      - "8005:8005"
    environment:
      PYTHONUNBUFFERED: "1"

  nginx:
    image: nginx:latest
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service

  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: password
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
