services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: microservices_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-service/create.sql:/docker-entrypoint-initdb.d/create.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microservices_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/microservices_db
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/microservices_db
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    expose:
      - "8000"

  product-service:
    build: ./product-service
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/microservices_db
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  order-service:
    build: ./order-service
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/microservices_db
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
    expose:
      - "8000"

  chat-service:
    build: ./chat-service
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/microservices_db
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service

volumes:
  postgres_data:
