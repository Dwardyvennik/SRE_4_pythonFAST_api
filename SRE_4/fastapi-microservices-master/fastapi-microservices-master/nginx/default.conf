server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api/auth {
        proxy_pass http://auth-service:8000/auth;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        proxy_pass http://auth-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /auth/ {
        proxy_pass http://auth-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location = /api/users {
        proxy_pass http://user-service:8000/users;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /api/users/ {
        rewrite ^/api/users/(.*)$ /users/$1 break;
        proxy_pass http://user-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /users/ {
        proxy_pass http://user-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location = /api/products {
        proxy_pass http://product-service:8000/products;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /api/products/ {
        rewrite ^/api/products/(.*)$ /products/$1 break;
        proxy_pass http://product-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /products/ {
        proxy_pass http://product-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location = /api/orders {
        proxy_pass http://order-service:8000/orders;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /api/orders/ {
        rewrite ^/api/orders/(.*)$ /orders/$1 break;
        proxy_pass http://order-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /orders/ {
        proxy_pass http://order-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location = /api/chat {
        proxy_pass http://chat-service:8000/chat;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /api/chat/ {
        rewrite ^/api/chat/(.*)$ /chat/$1 break;
        proxy_pass http://chat-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }

    location /chat/ {
        proxy_pass http://chat-service:8000;
        include /etc/nginx/conf.d/proxy_headers.conf;
    }
}
